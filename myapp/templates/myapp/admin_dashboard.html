<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard · MIATA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root {
  --navy:      #0a1628;
  --navy-mid:  #0d1f3c;
  --navy-card: #0f2347;
  --blue:      #2563eb;
  --blue-lt:   #3b82f6;
  --blue-glow: rgba(37,99,235,0.18);
  --white:     #ffffff;
  --muted:     rgba(255,255,255,0.45);
  --border:    rgba(59,130,246,0.18);
  --red:       #ef4444;
  --amber:     #f59e0b;
  --green:     #10b981;
  --sky:       #38bdf8;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--navy);min-height:100vh;color:var(--white);overflow-x:hidden;}

/* ── Top Nav ── */
.topnav{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:64px;background:rgba(10,22,40,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
.nav-brand{display:flex;align-items:center;gap:12px;}
.nav-mark{width:36px;height:36px;background:linear-gradient(135deg,#2563eb,#1d4ed8);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:white;}
.nav-brand span{font-family:'DM Serif Display',serif;font-size:17px;color:var(--white);}
.nav-brand small{font-size:11px;color:var(--muted);margin-left:6px;}
.nav-right{display:flex;align-items:center;gap:16px;}
.nav-badge{background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3);border-radius:20px;padding:5px 14px;font-size:12px;color:var(--blue-lt);}
.logout-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:7px 14px;font-size:12px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;text-decoration:none;display:inline-flex;align-items:center;}
.logout-btn:hover{background:rgba(255,255,255,0.1);color:var(--white);}

/* ── Main ── */
.main{padding:32px;}

/* ── Stats ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
.stat-card{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:16px;padding:20px 24px;}
.stat-card .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
.stat-card .value{font-family:'DM Serif Display',serif;font-size:32px;color:var(--white);line-height:1;}
.stat-card .sub{font-size:11px;color:var(--blue-lt);margin-top:6px;}
.stat-card.blue{border-color:rgba(59,130,246,0.35);background:rgba(37,99,235,0.1);}

/* ── Toolbar ── */
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.search-wrap{flex:1;min-width:220px;position:relative;}
.search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);stroke:var(--muted);}
.search-input{width:100%;padding:10px 16px 10px 42px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--white);outline:none;transition:border-color 0.2s;}
.search-input::placeholder{color:var(--muted);}
.search-input:focus{border-color:var(--blue-lt);}
.filter-select{padding:10px 14px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--white);outline:none;cursor:pointer;}
.filter-select option{background:#0a1628;}
.export-btn{display:flex;align-items:center;gap:8px;padding:10px 18px;background:rgba(37,99,235,0.12);border:1px solid rgba(59,130,246,0.3);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--blue-lt);cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.export-btn:hover{background:rgba(37,99,235,0.22);}

/* ── Table ── */
.table-wrap{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:18px;overflow:hidden;}
.table-header{display:grid;grid-template-columns:140px 1fr 120px 110px 130px 120px 100px 90px;gap:0;background:rgba(37,99,235,0.1);border-bottom:1px solid var(--border);}
.th{padding:13px 16px;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;white-space:nowrap;}
.table-body{max-height:calc(100vh - 340px);overflow-y:auto;}
.table-body::-webkit-scrollbar{width:6px;}
.table-body::-webkit-scrollbar-thumb{background:rgba(59,130,246,0.25);border-radius:3px;}
.tr{display:grid;grid-template-columns:140px 1fr 120px 110px 130px 120px 100px 90px;gap:0;border-bottom:1px solid rgba(255,255,255,0.04);transition:background 0.15s;cursor:pointer;}
.tr:hover{background:rgba(37,99,235,0.08);}
.tr:last-child{border-bottom:none;}
.td{padding:14px 16px;font-size:13px;color:rgba(255,255,255,0.8);display:flex;align-items:center;overflow:hidden;}
.td-ref{font-family:monospace;font-size:11px;color:var(--blue-lt);font-weight:600;}
.td-name{flex-direction:column;align-items:flex-start;gap:2px;}
.td-name strong{font-size:13px;color:var(--white);}
.td-name span{font-size:11px;color:var(--muted);}
.td-agent{flex-direction:column;align-items:flex-start;gap:2px;}
.td-agent strong{font-size:12px;color:var(--white);}
.td-agent span{font-size:11px;color:var(--muted);}
.td-agent .none{font-size:11px;color:rgba(255,255,255,0.2);font-style:italic;}
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.status-badge.pending{background:rgba(245,158,11,0.12);color:#f59e0b;border:1px solid rgba(245,158,11,0.25);}
.status-badge.reviewing{background:rgba(56,189,248,0.12);color:#38bdf8;border:1px solid rgba(56,189,248,0.25);}
.status-badge.accepted{background:rgba(16,185,129,0.12);color:#10b981;border:1px solid rgba(16,185,129,0.25);}
.status-badge.rejected{background:rgba(239,68,68,0.12);color:#ef4444;border:1px solid rgba(239,68,68,0.25);}
.status-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.docs-count{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);}
.docs-count svg{stroke:var(--blue-lt);}
.no-data{padding:60px;text-align:center;color:var(--muted);font-size:14px;}

/* ── Drawer ── */
.drawer-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(5,12,25,0.75);backdrop-filter:blur(6px);}
.drawer-overlay.open{display:flex;justify-content:flex-end;animation:fadeIn 0.2s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.drawer{width:min(540px,100vw);height:100vh;background:linear-gradient(180deg,#0f2347 0%,#0a1628 100%);border-left:1px solid var(--border);overflow-y:auto;animation:slideDrawer 0.3s ease;}
@keyframes slideDrawer{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
.drawer::-webkit-scrollbar{width:6px;}
.drawer::-webkit-scrollbar-thumb{background:rgba(59,130,246,0.25);border-radius:3px;}
.drawer-head{display:flex;align-items:center;justify-content:space-between;padding:24px 28px;border-bottom:1px solid var(--border);}
.drawer-head h3{font-family:'DM Serif Display',serif;font-size:18px;color:var(--white);}
.drawer-close{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.drawer-close svg{stroke:var(--muted);}
.drawer-body{padding:24px 28px;}
.d-section{margin-bottom:24px;}
.d-section-title{font-size:10px;font-weight:600;color:var(--blue-lt);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.d-section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.d-section-title.danger{color:#ef4444;}
.d-section-title.danger::after{background:rgba(239,68,68,0.2);}
.d-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.d-field{background:rgba(255,255,255,0.04);border-radius:10px;padding:12px 14px;}
.d-field label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;display:block;}
.d-field span{font-size:13px;color:var(--white);}
.d-field.full{grid-column:1/-1;}
.d-field.agent-highlight{background:rgba(37,99,235,0.08);border:1px solid rgba(59,130,246,0.2);}
.d-field span.none{color:rgba(255,255,255,0.25);font-style:italic;}
.sop-text{font-size:13px;color:rgba(255,255,255,0.75);line-height:1.7;background:rgba(255,255,255,0.04);border-radius:10px;padding:14px;}
.doc-tags{display:flex;flex-direction:column;gap:8px;}
.doc-tag{display:flex;align-items:center;gap:10px;background:rgba(37,99,235,0.07);border:1px solid rgba(59,130,246,0.15);border-radius:8px;padding:9px 12px;}
.doc-tag-label{font-size:11px;color:var(--muted);width:140px;flex-shrink:0;}
.doc-tag-files{font-size:12px;color:rgba(255,255,255,0.8);flex:1;}
.doc-tag-files .missing{color:rgba(255,255,255,0.2);font-style:italic;}

/* ── Status buttons ── */
.status-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.status-btn{flex:1;padding:9px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.6);}
.status-btn.s-pending.active{background:rgba(245,158,11,0.15);border-color:rgba(245,158,11,0.4);color:#f59e0b;}
.status-btn.s-reviewing.active{background:rgba(56,189,248,0.15);border-color:rgba(56,189,248,0.4);color:#38bdf8;}
.status-btn.s-accepted.active{background:rgba(16,185,129,0.15);border-color:rgba(16,185,129,0.4);color:#10b981;}
.status-btn.s-rejected.active{background:rgba(239,68,68,0.15);border-color:rgba(239,68,68,0.4);color:#ef4444;}

/* ── Email note ── */
.email-note-wrap{margin-bottom:16px;display:none;}
.email-note-wrap.visible{display:block;animation:fadeIn 0.2s ease;}
.email-note-label{font-size:11px;color:var(--blue-lt);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;font-weight:600;display:flex;align-items:center;gap:6px;}
.email-note-label svg{stroke:var(--blue-lt);}
.email-note-area{width:100%;padding:11px 14px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--white);resize:vertical;min-height:70px;outline:none;}
.email-note-area:focus{border-color:var(--blue-lt);}
.email-note-hint{font-size:11px;color:var(--muted);margin-top:6px;}

/* ── Confirm button ── */
.confirm-status-btn{width:100%;padding:11px;border-radius:10px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;display:none;align-items:center;justify-content:center;gap:8px;margin-bottom:16px;}
.confirm-status-btn.visible{display:flex;animation:fadeIn 0.2s ease;}
.confirm-status-btn.for-accepted{background:linear-gradient(135deg,#059669,#047857);color:white;}
.confirm-status-btn.for-rejected{background:linear-gradient(135deg,#ef4444,#dc2626);color:white;}
.confirm-status-btn.for-other{background:rgba(37,99,235,0.2);border:1px solid rgba(59,130,246,0.4);color:var(--blue-lt);}
.confirm-status-btn:disabled{opacity:0.6;cursor:not-allowed;}

/* ── Toast ── */
.email-toast{display:none;align-items:center;gap:8px;background:rgba(5,150,105,0.12);border:1px solid rgba(5,150,105,0.3);border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:#34d399;}
.email-toast.show{display:flex;animation:fadeIn 0.3s ease;}
.email-toast svg{stroke:#34d399;flex-shrink:0;}

/* ── Notes ── */
.note-area{width:100%;padding:11px 14px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--white);resize:vertical;min-height:80px;outline:none;}
.note-area:focus{border-color:var(--blue-lt);}
.save-note-btn{margin-top:8px;padding:9px 20px;background:rgba(37,99,235,0.15);border:1px solid rgba(59,130,246,0.3);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--blue-lt);cursor:pointer;transition:all 0.2s;}
.save-note-btn:hover{background:rgba(37,99,235,0.28);}
.action-log{display:flex;flex-direction:column;gap:8px;margin-top:12px;}
.log-item{font-size:12px;color:var(--muted);display:flex;gap:8px;}
.log-item time{color:rgba(255,255,255,0.3);white-space:nowrap;}

/* ── Delete zone ── */
.delete-zone{background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.15);border-radius:14px;padding:18px 20px;}
.delete-zone p{font-size:13px;color:rgba(255,255,255,0.5);line-height:1.6;margin-bottom:16px;}
.delete-zone p strong{color:rgba(255,255,255,0.75);}
.delete-trigger-btn{display:flex;align-items:center;gap:8px;padding:10px 18px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:#ef4444;cursor:pointer;transition:all 0.2s;}
.delete-trigger-btn:hover{background:rgba(239,68,68,0.2);border-color:rgba(239,68,68,0.5);}
.delete-trigger-btn svg{stroke:#ef4444;width:14px;height:14px;}
.delete-confirm-wrap{display:none;margin-top:16px;padding-top:16px;border-top:1px solid rgba(239,68,68,0.15);}
.delete-confirm-wrap.visible{display:block;animation:fadeIn 0.2s ease;}
.delete-confirm-wrap p{font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:12px;}
.delete-confirm-wrap p strong{color:#ef4444;}
.delete-confirm-actions{display:flex;gap:10px;}
.del-cancel{flex:1;padding:9px;border-radius:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);font-family:'DM Sans',sans-serif;font-size:13px;color:rgba(255,255,255,0.55);cursor:pointer;transition:all 0.2s;}
.del-cancel:hover{background:rgba(255,255,255,0.09);color:var(--white);}
.del-confirm{flex:1;padding:9px;border-radius:8px;background:rgba(239,68,68,0.18);border:1px solid rgba(239,68,68,0.45);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:#ef4444;cursor:pointer;transition:all 0.2s;}
.del-confirm:hover{background:rgba(239,68,68,0.32);}
.del-confirm:disabled{opacity:0.35;cursor:not-allowed;}

/* ── Pagination ── */
.pagination{display:flex;align-items:center;justify-content:space-between;margin-top:16px;font-size:13px;color:var(--muted);}
.pag-btns{display:flex;gap:6px;}
.pag-btn{padding:6px 14px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;transition:all 0.2s;}
.pag-btn:hover,.pag-btn.active{background:rgba(37,99,235,0.18);border-color:rgba(59,130,246,0.35);color:var(--blue-lt);}
.pag-btn:disabled{opacity:0.3;cursor:not-allowed;}

@media(max-width:1100px){.stats-grid{grid-template-columns:repeat(2,1fr);}.table-header,.tr{grid-template-columns:120px 1fr 120px 100px 110px 0px 100px 80px;}.th:nth-child(6),.td:nth-child(6){display:none;}}
@media(max-width:768px){.main{padding:16px;}.stats-grid{grid-template-columns:1fr 1fr;}.table-header,.tr{grid-template-columns:110px 1fr 90px 80px;}.th:nth-child(n+5),.td:nth-child(n+5){display:none;}}
</style>
</head>
<body>

<nav class="topnav">
  <div class="nav-brand">
    <div class="nav-mark">M</div>
    <span>MIATA</span>
    <small>Admin Dashboard</small>
  </div>
  <div class="nav-right">
    <div class="nav-badge" id="liveCount">0 Applications</div>
    <a class="logout-btn" href="/logout/">Sign Out</a>
  </div>
</nav>

<div class="main">
  <div class="stats-grid">
    <div class="stat-card blue"><div class="label">Total Applications</div><div class="value" id="s-total">0</div><div class="sub">All time</div></div>
    <div class="stat-card"><div class="label">Pending Review</div><div class="value" id="s-pending">0</div><div class="sub">Awaiting action</div></div>
    <div class="stat-card"><div class="label">Accepted</div><div class="value" id="s-accepted">0</div><div class="sub">This cycle</div></div>
    <div class="stat-card"><div class="label">Via Agent</div><div class="value" id="s-agent">0</div><div class="sub">Agent-referred</div></div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="searchInput" placeholder="Search name, email, country, agent…" oninput="renderTable()">
    </div>
    <select class="filter-select" id="statusFilter" onchange="renderTable()">
      <option value="">All Statuses</option>
      <option value="pending">Pending</option>
      <option value="reviewing">Reviewing</option>
      <option value="accepted">Accepted</option>
      <option value="rejected">Rejected</option>
    </select>
    <button class="export-btn" onclick="exportCSV()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export CSV
    </button>
  </div>

  <div class="table-wrap">
    <div class="table-header">
      <div class="th">Ref #</div>
      <div class="th">Applicant</div>
      <div class="th">Country</div>
      <div class="th">Phone</div>
      <div class="th">Agent</div>
      <div class="th">Documents</div>
      <div class="th">Status</div>
      <div class="th">Date</div>
    </div>
    <div class="table-body" id="tableBody"></div>
  </div>

  <div class="pagination">
    <span id="pagInfo">Showing 0 of 0</span>
    <div class="pag-btns" id="pagBtns"></div>
  </div>
</div>

<!-- DRAWER -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer(event)">
  <div class="drawer" id="drawer">
    <div class="drawer-head">
      <h3 id="drawerTitle">Application Details</h3>
      <button class="drawer-close" onclick="closeDrawer()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
  </div>
</div>

<script>
const API_UPDATE_STATUS = '/api/update-status/';
const API_DELETE        = '/api/delete-application/';

function getApps(){ return JSON.parse(localStorage.getItem('miata_applications') || '[]'); }
function saveApps(a){ localStorage.setItem('miata_applications', JSON.stringify(a)); }

const PAGE_SIZE = 15;
let currentPage  = 1;
let filteredApps = [];

document.addEventListener('DOMContentLoaded', init);
function init(){ renderStats(); renderTable(); setInterval(()=>{ renderStats(); renderTable(); }, 10000); }

function renderStats(){
  const apps = getApps();
  document.getElementById('s-total').textContent    = apps.length;
  document.getElementById('s-pending').textContent  = apps.filter(a=>a.status==='pending').length;
  document.getElementById('s-accepted').textContent = apps.filter(a=>a.status==='accepted').length;
  document.getElementById('s-agent').textContent    = apps.filter(a=>a.agent_name&&a.agent_name.trim()).length;
  document.getElementById('liveCount').textContent  = apps.length+' Application'+(apps.length!==1?'s':'');
}

function renderTable(){
  const apps = getApps();
  const q    = document.getElementById('searchInput').value.toLowerCase();
  const sf   = document.getElementById('statusFilter').value;
  filteredApps = apps.filter(a=>{
    const mq = !q||[a.full_name,a.email,a.country,a.phone,a.id,a.agent_name,a.agent_contact].some(v=>v&&v.toLowerCase().includes(q));
    const ms = !sf||a.status===sf;
    return mq&&ms;
  });
  const total = filteredApps.length;
  const pages = Math.max(1,Math.ceil(total/PAGE_SIZE));
  if(currentPage>pages) currentPage=1;
  const slice = filteredApps.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);
  const body  = document.getElementById('tableBody');
  if(!slice.length){ body.innerHTML='<div class="no-data">No applications found.</div>'; }
  else {
    body.innerHTML = slice.map(a=>rowHTML(a)).join('');
    body.querySelectorAll('.tr').forEach(r=>r.addEventListener('click',()=>openDrawer(r.dataset.id)));
  }
  document.getElementById('pagInfo').textContent = total
    ? `Showing ${Math.min((currentPage-1)*PAGE_SIZE+1,total)}–${Math.min(currentPage*PAGE_SIZE,total)} of ${total}`
    : 'No results';
  renderPag(pages);
}

function rowHTML(a){
  const date = new Date(a.submittedAt).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'2-digit'});
  const dc   = Object.values(a.docs||{}).flat().length;
  const ag   = a.agent_name
    ? `<strong>${esc(a.agent_name)}</strong><span>${esc(a.agent_contact||'—')}</span>`
    : `<span class="none">—</span>`;
  return `<div class="tr" data-id="${a.id}">
    <div class="td"><span class="td-ref">${a.id}</span></div>
    <div class="td td-name"><strong>${esc(a.full_name)}</strong><span>${esc(a.email)}</span></div>
    <div class="td">${esc(a.country)}</div>
    <div class="td" style="font-size:12px">${esc(a.phone)}</div>
    <div class="td td-agent">${ag}</div>
    <div class="td"><div class="docs-count"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>${dc} file${dc!==1?'s':''}</div></div>
    <div class="td"><span class="status-badge ${a.status||'pending'}"><span class="status-dot"></span>${cap(a.status||'pending')}</span></div>
    <div class="td" style="font-size:11px;color:var(--muted)">${date}</div>
  </div>`;
}

function renderPag(pages){
  const c = document.getElementById('pagBtns'); c.innerHTML='';
  const prev = document.createElement('button'); prev.className='pag-btn'; prev.textContent='← Prev'; prev.disabled=currentPage===1; prev.onclick=()=>{currentPage--;renderTable();}; c.appendChild(prev);
  for(let i=1;i<=Math.min(pages,7);i++){const b=document.createElement('button');b.className='pag-btn'+(i===currentPage?' active':'');b.textContent=i;b.onclick=(()=>{const p=i;return()=>{currentPage=p;renderTable();};})(  );c.appendChild(b);}
  const next = document.createElement('button'); next.className='pag-btn'; next.textContent='Next →'; next.disabled=currentPage===pages; next.onclick=()=>{currentPage++;renderTable();}; c.appendChild(next);
}

let _drawerCurrentId=null, _pendingStatus=null;

function openDrawer(id){
  _drawerCurrentId=id; _pendingStatus=null;
  const apps=getApps(); const a=apps.find(x=>x.id===id); if(!a) return;
  document.getElementById('drawerTitle').textContent=a.id;

  const docLabels={
    ug_certificate:'UG Certificate',transcripts:'Transcripts',
    passport:'Passport',cv:'CV / Resume',
    english_proof:'English Proficiency',references:'Reference Letters',
    work_experience:'Work Experience'
  };
  const docHTML=Object.entries(docLabels).map(([k,label])=>{
    const files=(a.docs&&a.docs[k])||[];
    return `<div class="doc-tag"><span class="doc-tag-label">${label}</span><span class="doc-tag-files">${files.length?esc(files.join(', ')):'<span class="missing">Not uploaded</span>'}</span></div>`;
  }).join('');

  const logHTML=(a.actionLog||[]).slice(0,10).map(l=>
    `<div class="log-item"><time>${new Date(l.at).toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</time><span>${esc(l.note)}</span></div>`
  ).join('')||'<div class="log-item"><span style="color:rgba(255,255,255,0.2)">No activity yet.</span></div>';

  document.getElementById('drawerBody').innerHTML=`
    <div class="d-section">
      <div class="d-section-title">Update Status</div>
      <div class="status-row">
        ${['pending','reviewing','accepted','rejected'].map(s=>
          `<button class="status-btn s-${s}${a.status===s?' active':''}" id="sbtn-${s}" onclick="selectStatus('${id}','${s}')">${cap(s)}</button>`
        ).join('')}
      </div>
      <div class="email-note-wrap" id="emailNoteWrap">
        <div class="email-note-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          Optional message to include in the email
        </div>
        <textarea class="email-note-area" id="emailNoteArea" placeholder="e.g. Please complete fee payment within 7 days…" rows="3"></textarea>
        <div class="email-note-hint">This message will appear in the email sent to the applicant.</div>
      </div>
      <button class="confirm-status-btn" id="confirmStatusBtn" onclick="confirmStatus('${id}')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        <span id="confirmBtnLabel">Confirm &amp; Save</span>
      </button>
      <div class="email-toast" id="emailToast">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        <span id="emailToastMsg"></span>
      </div>
    </div>

    <div class="d-section">
      <div class="d-section-title">Personal Information</div>
      <div class="d-grid">
        <div class="d-field"><label>Full Name</label><span>${esc(a.full_name)}</span></div>
        <div class="d-field"><label>Email</label><span>${esc(a.email)}</span></div>
        <div class="d-field"><label>Phone</label><span>${esc(a.phone)}</span></div>
        <div class="d-field"><label>Country</label><span>${esc(a.country)}</span></div>
        <div class="d-field"><label>Submitted</label><span>${new Date(a.submittedAt).toLocaleString('en-IN',{timeZone:'Asia/Kolkata'})}</span></div>
        <div class="d-field"><label>Ref Number</label><span>${a.id}</span></div>
      </div>
    </div>

    <div class="d-section">
      <div class="d-section-title">Agent Details</div>
      <div class="d-grid">
        <div class="d-field agent-highlight"><label>Agent Name</label><span${!a.agent_name?' class="none"':''}>${a.agent_name?esc(a.agent_name):'Not provided'}</span></div>
        <div class="d-field agent-highlight"><label>Agent Contact</label><span${!a.agent_contact?' class="none"':''}>${a.agent_contact?esc(a.agent_contact):'Not provided'}</span></div>
      </div>
    </div>

    <div class="d-section">
      <div class="d-section-title">Statement of Purpose</div>
      <div class="sop-text">${esc(a.sop||'—')}</div>
    </div>

    <div class="d-section">
      <div class="d-section-title">Uploaded Documents</div>
      <div class="doc-tags">${docHTML}</div>
    </div>

    <div class="d-section">
      <div class="d-section-title">Notes &amp; Activity</div>
      <textarea class="note-area" id="noteArea" placeholder="Add a note about this applicant…">${(a.actionLog&&a.actionLog[0]&&a.actionLog[0].note)||''}</textarea>
      <button class="save-note-btn" onclick="saveNote('${id}')">Save Note</button>
      <div class="action-log">${logHTML}</div>
    </div>

    <div class="d-section">
      <div class="d-section-title danger">Delete Application</div>
      <div class="delete-zone">
        <p>Permanently remove <strong>${esc(a.full_name)}</strong>'s application (${a.id}) including all documents, notes, and activity history. This action cannot be undone.</p>
        <button class="delete-trigger-btn" onclick="showDeleteConfirm()">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          Delete this application
        </button>
        <div class="delete-confirm-wrap" id="deleteConfirmWrap">
          <p>Are you sure? Type <strong>DELETE</strong> to confirm, then click the button below.</p>
          <input id="deleteConfirmInput"
            style="width:100%;padding:9px 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(239,68,68,0.3);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--white);outline:none;margin-bottom:12px;"
            placeholder="Type DELETE to confirm"
            oninput="checkDeleteInput()">
          <div class="delete-confirm-actions">
            <button class="del-cancel" onclick="hideDeleteConfirm()">Cancel</button>
            <button class="del-confirm" id="delConfirmBtn" disabled onclick="confirmDelete('${id}')">Yes, Delete Permanently</button>
          </div>
        </div>
      </div>
    </div>
  `;

  document.getElementById('drawerOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeDrawer(e){
  if(e&&e.target!==document.getElementById('drawerOverlay')&&!e.target.closest&&!e.target.classList.contains('drawer-close')) return;
  if(e&&e.target&&e.target!==document.getElementById('drawerOverlay')&&!e.target.closest('.drawer-close')) return;
  document.getElementById('drawerOverlay').classList.remove('open');
  document.body.style.overflow='';
  _drawerCurrentId=null; _pendingStatus=null;
  renderTable();
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeDrawer({target:document.getElementById('drawerOverlay')}); });

function showDeleteConfirm(){
  document.getElementById('deleteConfirmWrap').classList.add('visible');
  document.getElementById('deleteConfirmInput').focus();
}
function hideDeleteConfirm(){
  document.getElementById('deleteConfirmWrap').classList.remove('visible');
  document.getElementById('deleteConfirmInput').value='';
  document.getElementById('delConfirmBtn').disabled=true;
}
function checkDeleteInput(){
  const val=document.getElementById('deleteConfirmInput').value.trim();
  document.getElementById('delConfirmBtn').disabled=(val!=='DELETE');
}

async function confirmDelete(id){
  const apps=getApps();
  saveApps(apps.filter(x=>x.id!==id));
  try{
    const csrf=getCookie('csrftoken');
    await fetch(API_DELETE,{
      method:'POST',
      headers:{'Content-Type':'application/json',...(csrf?{'X-CSRFToken':csrf}:{})},
      body:JSON.stringify({ref_id:id})
    });
  }catch(e){ console.warn('Delete API failed (offline?)',e); }
  document.getElementById('drawerOverlay').classList.remove('open');
  document.body.style.overflow='';
  _drawerCurrentId=null;
  renderStats(); renderTable();
}

function selectStatus(id,status){
  _pendingStatus=status;
  ['pending','reviewing','accepted','rejected'].forEach(s=>{
    const b=document.getElementById(`sbtn-${s}`); if(b) b.classList.toggle('active',s===status);
  });
  const nw=document.getElementById('emailNoteWrap');
  const cb=document.getElementById('confirmStatusBtn');
  const bl=document.getElementById('confirmBtnLabel');
  if(status==='accepted'){
    nw.classList.add('visible'); cb.classList.add('visible','for-accepted'); cb.classList.remove('for-rejected','for-other'); bl.textContent='✓ Accept & Send Email';
  } else if(status==='rejected'){
    nw.classList.add('visible'); cb.classList.add('visible','for-rejected'); cb.classList.remove('for-accepted','for-other'); bl.textContent='✗ Reject & Send Email';
  } else {
    nw.classList.remove('visible'); cb.classList.add('visible','for-other'); cb.classList.remove('for-accepted','for-rejected'); bl.textContent='✓ Save Status';
  }
  document.getElementById('emailToast').classList.remove('show');
}

async function confirmStatus(id){
  if(!_pendingStatus) return;
  const apps=getApps(); const a=apps.find(x=>x.id===id); if(!a) return;
  const status=_pendingStatus, note=(document.getElementById('emailNoteArea')||{}).value||'';
  const cb=document.getElementById('confirmStatusBtn'), bl=document.getElementById('confirmBtnLabel');
  cb.disabled=true; const orig=bl.textContent; bl.textContent='Sending…';
  a.status=status; a.actionLog=a.actionLog||[];
  a.actionLog.unshift({at:new Date().toISOString(),note:`Status changed to ${status}`+(note?` · Note: ${note}`:'')});
  saveApps(apps);
  let sent=false;
  try{
    const csrf=getCookie('csrftoken');
    const r=await fetch(API_UPDATE_STATUS,{method:'POST',headers:{'Content-Type':'application/json',...(csrf?{'X-CSRFToken':csrf}:{})},body:JSON.stringify({ref_id:id,status,note})});
    const d=await r.json(); sent=d.email_sent;
  }catch(e){ console.warn(e); }
  const toast=document.getElementById('emailToast'), msg=document.getElementById('emailToastMsg');
  if(status==='accepted') msg.textContent=sent?'✓ Accepted — confirmation email sent.':'✓ Accepted. (Email may not have sent — check server logs.)';
  else if(status==='rejected') msg.textContent=sent?'✓ Rejected — notification email sent.':'✓ Rejected. (Email may not have sent — check server logs.)';
  else msg.textContent=`✓ Status updated to ${cap(status)}.`;
  toast.classList.add('show');
  cb.disabled=false; bl.textContent=orig; cb.classList.remove('visible');
  document.getElementById('emailNoteWrap').classList.remove('visible');
  _pendingStatus=null;
  renderStats();
}

function saveNote(id){
  const note=document.getElementById('noteArea').value.trim(); if(!note) return;
  const apps=getApps(); const a=apps.find(x=>x.id===id); if(!a) return;
  a.actionLog=a.actionLog||[]; a.actionLog.unshift({at:new Date().toISOString(),note});
  saveApps(apps); openDrawer(id);
}

function exportCSV(){
  const apps=filteredApps.length?filteredApps:getApps();
  const h=['Ref','Full Name','Email','Phone','Country','Agent Name','Agent Contact','Status','Submitted','UG Cert','Transcripts','Passport','CV','English Proof','References','Work Exp','SOP'];
  const rows=apps.map(a=>[
    a.id,a.full_name,a.email,a.phone,a.country,
    a.agent_name||'',a.agent_contact||'',
    a.status,new Date(a.submittedAt).toLocaleString('en-IN'),
    (a.docs?.ug_certificate||[]).join('; '),(a.docs?.transcripts||[]).join('; '),
    (a.docs?.passport||[]).join('; '),(a.docs?.cv||[]).join('; '),
    (a.docs?.english_proof||[]).join('; '),(a.docs?.references||[]).join('; '),
    (a.docs?.work_experience||[]).join('; '),(a.sop||'').replace(/\n/g,' ')
  ].map(v=>`"${String(v).replace(/"/g,'""')}"`));
  const csv=[h.join(','),...rows.map(r=>r.join(','))].join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const anchor=document.createElement('a'); anchor.href=url; anchor.download=`miata-applications-${new Date().toISOString().slice(0,10)}.csv`; anchor.click();
  URL.revokeObjectURL(url);
}

function esc(s){ if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function cap(s){ return s?s[0].toUpperCase()+s.slice(1):''; }
function getCookie(name){
  const v=`; ${document.cookie}`; const p=v.split(`; ${name}=`);
  if(p.length===2) return p.pop().split(';').shift(); return null;
}
</script>
